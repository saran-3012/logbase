<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Three log entry bars — varying widths suggest real log data -->
  <rect x="5" y="6"   width="22" height="4" rx="2" fill="#6366f1"/>
  <rect x="5" y="12"  width="16" height="4" rx="2" fill="#6366f1" opacity="0.7"/>
  <rect x="5" y="18"  width="19" height="4" rx="2" fill="#6366f1" opacity="0.45"/>

  <!-- Base platform — the "base" in Logbase -->
  <rect x="3" y="25"  width="26" height="3.5" rx="1.75" fill="#6366f1"/>
</svg>
