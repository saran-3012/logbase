<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logbase — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f172a;
      --surface:    #1e293b;
      --border:     #334155;
      --text:       #f1f5f9;
      --muted:      #94a3b8;
      --accent:     #6366f1;
      --accent-dim: #4f46e5;
      --success:    #22c55e;
      --error:      #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 12px;
      margin-bottom: .75rem;
    }
    .logo h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .logo p { color: var(--muted); font-size: .85rem; margin-top: .2rem; }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: .45rem;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .65rem .85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: .7rem;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s, opacity .15s;
    }
    .btn-primary:hover  { background: var(--accent-dim); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* Alert */
    .alert {
      padding: .7rem 1rem;
      border-radius: 6px;
      font-size: .875rem;
      margin-bottom: 1rem;
    }
    .alert-error   { background: rgba(239,68,68,.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    .alert-success { background: rgba(34,197,94,.15);  color: #86efac; border: 1px solid rgba(34,197,94,.3); }
    .hidden { display: none !important; }

    .tab-pane { display: block; }
    .tab-pane.hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
          <rect x="3"  y="3"  width="24" height="5" rx="2.5" fill="white"/>
          <rect x="3"  y="11" width="18" height="5" rx="2.5" fill="white" opacity="0.75"/>
          <rect x="3"  y="19" width="21" height="5" rx="2.5" fill="white" opacity="0.5"/>
        </svg>
      </div>
      <h1>Logbase</h1>
      <p>Log ingestion &amp; monitoring</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn"        data-tab="register">Register</button>
    </div>

    <div id="alert-msg" class="alert hidden"></div>

    <!-- Login -->
    <div id="tab-login" class="tab-pane">
      <form id="login-form">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" placeholder="your-username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
    </div>

    <!-- Register -->
    <div id="tab-register" class="tab-pane hidden">
      <form id="register-form">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="your-username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="min 8 characters" autocomplete="new-password" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input id="reg-confirm" type="password" placeholder="repeat password" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
