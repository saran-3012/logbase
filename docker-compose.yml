services:
  logbase:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Generate a strong secret: openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env variable is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LOG_RETENTION_HOURS: ${LOG_RETENTION_HOURS:-24}
      # Turso: libsql://<db-name>-<org>.turso.io
      # Local SQLite fallback: file:./data/logs.db
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:?TURSO_DATABASE_URL env variable is required}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
    restart: unless-stopped
